<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Ecommerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Mini Ecommerce</h1>

    <div class="controls">
        <input type="text" id="search" placeholder="Buscar produto...">
        
        <select id="category">
            <option value="Todas">Todas</option>
        </select>
        
        <button id="btnRender">Renderizar</button>
    </div>

    <div id="product-list"></div>

    <!-- Área de Detalhes do Produto -->
    <div id="product-details">
        <h3>Detalhes do Produto</h3>
        <p>Clique em "Ver detalhes" de um produto para visualizar as informações aqui.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
